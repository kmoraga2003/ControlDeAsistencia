<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Visitas - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-login">
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-container">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="login-logo mb-3">
                            <i class="bi bi-building"></i>
                        </div>
                        <h1 class="h3 fw-bold text-primary">Control de Visitas</h1>
                        <p class="text-muted">Sistema de Registro y Control de Asistencia</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0" id="email" placeholder="correo@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" placeholder="Ingresa tu contraseña" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                        </button>
                    </form>

                    <hr class="my-4">
                    
                    <div class="alert alert-info small mb-0">
                        <strong>Usuarios de prueba:</strong>
                        <div class="mt-2">
                            <div><strong>Admin:</strong> admin@example.com</div>
                            <div><strong>Usuario:</strong> usuario@example.com</div>
                            <div><strong>Guardia:</strong> guardia@example.com</div>
                            <div class="mt-2"><strong>Contraseña (todas):</strong> password123</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4 text-white">
                <small>&copy; 2024 Sistema de Control de Visitas - Todos los derechos reservados</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validar credenciales de prueba
            const users = {
                'admin@example.com': { role: 'Administrador', unit: 1, name: 'Admin User' },
                'usuario@example.com': { role: 'Usuario', unit: 2, name: 'Usuario Funcionario' },
                'guardia@example.com': { role: 'Guardia', unit: 2, name: 'Guardia Sistema' }
            };

            if (users[email] && password === 'password123') {
                const user = users[email];
                sessionStorage.setItem('currentUser', JSON.stringify({
                    email: email,
                    role: user.role,
                    unit_id: user.unit,
                    name: user.name,
                    user_id: Math.floor(Math.random() * 1000)
                }));
                window.location.href = 'dashboard.html';
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Credenciales inválidas',
                    text: 'El email o contraseña son incorrectos.'
                });
            }
        });
    </script>
</body>
</html>
